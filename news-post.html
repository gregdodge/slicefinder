
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍕</text></svg>'>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
  <title>SliceFinder – Pizza News</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Alfa%20Slab%20One">
  <style>
    html, body { margin:0; padding:0; font-family:Tahoma,sans-serif; background:#f5f5f5; overflow-x:hidden; }

    .navbar { margin-bottom:0; border-radius:0; width:100%; }
    .navbar-brand { font-family:'Alfa Slab One',serif; color:#c0392b !important; font-size:24px; letter-spacing:1px; }
    @media (max-width:767px) {
      #bs-navbar { display:none; width:100%; }
      #bs-navbar.open { display:block; }
      #bs-navbar .nav > li > a { color:#fff !important; padding:10px 16px; }
      #bs-navbar .nav > li > a:hover { background:#333 !important; }
      #nav-toggle { display:block !important; }
    }
    @media (min-width:768px) {
      #bs-navbar { display:block !important; }
      #nav-toggle { display:none !important; }
    }

    .page-container { max-width:740px; margin:30px auto; padding:0 16px 60px; }

    .back-link {
      display:inline-block; font-size:12px; color:#aaa;
      text-decoration:none; margin-bottom:20px;
    }
    .back-link:hover { color:#c0392b; }

    .post-card {
      background:#fff; border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.07);
      padding:28px 32px;
      border-left:4px solid #c0392b;
    }
    .post-title {
      font-family:'Alfa Slab One',serif;
      color:#222; font-size:24px; margin:0 0 8px;
      line-height:1.3;
    }
    .post-meta {
      font-size:11px; color:#aaa; margin-bottom:18px;
      text-transform:uppercase; letter-spacing:1px;
    }
    .post-body {
      font-size:14px; color:#444; line-height:1.8;
      margin-bottom:18px; white-space:pre-wrap;
    }
    .post-link a {
      color:#c0392b; font-size:13px; font-weight:bold;
      text-decoration:none;
    }
    .post-link a:hover { text-decoration:underline; }
    .post-link a::after { content:' →'; }

    .post-admin {
      margin-top:16px; padding-top:12px;
      border-top:1px solid #f0f0f0;
      display:flex; gap:8px;
    }

    #loading-msg { text-align:center; padding:60px 0; color:#aaa; font-style:italic; }
    #error-msg   { text-align:center; padding:60px 0; color:#c0392b; }

    footer { background:#555; color:#fff; padding:10px; text-align:center; margin-top:20px; }
    footer p { margin:0; }
  </style>
</head>
<body>

  <nav class="navbar navbar-inverse">
    <div class="container-fluid" style="padding:0 10px;">
      <div class="navbar-header">
        <button id="nav-toggle" type="button" class="navbar-toggle" aria-expanded="false">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="index.html">SliceFinder</a>
      </div>
      <div id="bs-navbar">
        <ul class="nav navbar-nav">
          <li><a href="index.html">Restaurants</a></li>
          <li><a href="frozen.html">Frozen Pizza</a></li>
          <li class="active"><a href="news.html">Pizza News</a></li>
          <li><a href="profile.html">My Profile</a></li>
        </ul>
        <ul class="nav navbar-nav navbar-right">
          <li><a href="profile.html" id="nav-auth-btn" style="color:#c0392b !important;font-weight:bold;">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-container">
    <a href="news.html" class="back-link">← Back to Pizza News</a>
    <div id="loading-msg">Loading post…</div>
    <div id="error-msg" style="display:none;">Post not found. <a href="news.html">← Back to News</a></div>
    <div id="post-wrap" style="display:none;">
      <div class="post-card">
        <div class="post-title" id="post-title"></div>
        <div class="post-meta" id="post-meta"></div>
        <div class="post-body" id="post-body"></div>
        <div class="post-link" id="post-link"></div>
        <div class="post-admin" id="post-admin" style="display:none;">
          <a id="edit-btn" href="#" class="btn btn-default btn-xs">✏️ Edit</a>
          <button class="btn btn-danger btn-xs" onclick="deletePost()">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>

  <footer><p>SliceFinder &copy;2026</p></footer>

  <script>
    document.getElementById('nav-toggle').addEventListener('click', function() {
      var nav = document.getElementById('bs-navbar');
      nav.classList.toggle('open');
      this.setAttribute('aria-expanded', nav.classList.contains('open'));
    });
  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js';
    import { getFirestore, doc, getDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyB-5Bz4rpHehUbxX7kP__-ap0xSuSdwZ0E",
      authDomain: "slicefinder-afd7f.firebaseapp.com",
      projectId: "slicefinder-afd7f",
      storageBucket: "slicefinder-afd7f.firebasestorage.app",
      messagingSenderId: "103165329059",
      appId: "1:103165329059:web:721f516c20d701ebe98916"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);

    const postId = new URLSearchParams(window.location.search).get('id');
    let postData = null;

    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    }

    // ── Load post ─────────────────────────────────────────────────────
    async function loadPost() {
      if (!postId) { showError(); return; }
      try {
        const snap = await getDoc(doc(db, 'news', postId));
        if (!snap.exists()) { showError(); return; }
        postData = snap.data();

        document.title = (postData.title || 'Post') + ' – SliceFinder';
        document.getElementById('post-title').textContent = postData.title || '';
        document.getElementById('post-meta').textContent  = formatDate(postData.createdAt);
        document.getElementById('post-body').textContent  = postData.body || '';

        const linkEl = document.getElementById('post-link');
        if (postData.linkUrl) {
          linkEl.innerHTML = `<a href="${postData.linkUrl}" target="_blank" rel="noopener">${postData.linkText || 'Read more'}</a>`;
        }

        document.getElementById('edit-btn').href = `add-news.html?edit=${postId}`;
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('post-wrap').style.display   = 'block';
      } catch(e) {
        showError();
        console.error(e);
      }
    }

    function showError() {
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('error-msg').style.display   = 'block';
    }

    // ── Auth / admin ──────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      const btn = document.getElementById('nav-auth-btn');
      if (btn) btn.textContent = user ? (user.displayName || 'My Profile') : 'Login';

      if (user) {
        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (userDoc.exists() && userDoc.data().isAdmin === true) {
            document.getElementById('post-admin').style.display = 'flex';
          }
        } catch(e) {}
      }
    });

    // ── Delete ────────────────────────────────────────────────────────
    window.deletePost = async function() {
      if (!confirm(`Delete "${postData?.title || 'this post'}"?`)) return;
      try {
        await deleteDoc(doc(db, 'news', postId));
        window.location.href = 'news.html';
      } catch(e) { alert('Delete failed: ' + e.message); }
    };

    loadPost();
  </script>

  <style>
    @media (max-width:767px) {
      #bs-navbar { display:none; width:100%; }
      #bs-navbar.open { display:block; }
      #bs-navbar .nav > li > a { color:#fff !important; padding:10px 16px; }
      #bs-navbar .nav > li > a:hover { background:#333 !important; }
      #nav-toggle { display:block !important; }
    }
    @media (min-width:768px) {
      #bs-navbar { display:block !important; }
      #nav-toggle { display:none !important; }
    }
  </style>

</body>
</html>
