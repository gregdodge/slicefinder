
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍕</text></svg>'>
  <title>SliceFinder – Add News Post</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Alfa%20Slab%20One">
  <style>
    html, body { margin:0; padding:0; font-family:Tahoma,sans-serif; background:#f5f5f5; }

    .navbar { margin-bottom:0; border-radius:0; }
    .navbar-brand { font-family:'Alfa Slab One',serif; color:#c0392b !important; font-size:24px; }

    .form-card {
      background:#fff; border-radius:6px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      padding:30px; margin:30px auto; max-width:680px;
    }
    .form-card h3 {
      font-family:'Alfa Slab One',serif; color:#c0392b;
      margin-top:0; margin-bottom:20px;
    }
    .section-label {
      font-size:11px; font-weight:bold; text-transform:uppercase;
      letter-spacing:1px; color:#999; margin:20px 0 8px;
      border-bottom:1px solid #eee; padding-bottom:4px;
    }
    #form-status { margin-top:16px; font-weight:bold; font-size:14px; min-height:20px; }

    #access-denied, #auth-loading {
      text-align:center; padding:60px 20px; max-width:680px; margin:0 auto;
    }
    #access-denied h4 { color:#c0392b; }

    /* Preview card */
    #preview-card {
      display:none;
      background:#fff; border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.07);
      padding:24px 28px; margin:0 auto 30px; max-width:680px;
      border-left:4px solid #c0392b;
    }
    #preview-card h4 { font-family:'Alfa Slab One',serif; color:#222; margin-top:0; }
    #preview-card .preview-meta { font-size:11px; color:#aaa; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
    #preview-card .preview-body { font-size:14px; color:#444; line-height:1.7; white-space:pre-wrap; }
    #preview-card .preview-link a { color:#c0392b; font-size:13px; font-weight:bold; text-decoration:none; }

    footer { background:#555; color:#fff; padding:15px; text-align:center; margin-top:40px; }
    footer p { margin:0; }
  </style>
</head>
<body>

  <nav class="navbar navbar-inverse">
    <div class="container-fluid" style="padding:0 10px;">
      <div class="navbar-header">
        <button id="nav-toggle" type="button" class="navbar-toggle" aria-expanded="false">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="index.html">SliceFinder</a>
      </div>
      <div id="bs-navbar">
        <ul class="nav navbar-nav">
          <li><a href="index.html">Restaurants</a></li>
          <li><a href="frozen.html">Frozen Pizza</a></li>
          <li class="active"><a href="news.html">Pizza News</a></li>
          <li><a href="profile.html">My Profile</a></li>
        </ul>
        <ul class="nav navbar-nav navbar-right">
          <li><a href="profile.html" id="nav-auth-btn" style="color:#c0392b !important;font-weight:bold;">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div id="auth-loading"><p style="color:#aaa;">Checking permissions…</p></div>
  <div id="access-denied" style="display:none;">
    <h4>🚫 Admin Access Required</h4>
    <p style="color:#666;">You need to be logged in as an admin to post news.</p>
    <a href="news.html" class="btn btn-default btn-sm">← Back to News</a>
  </div>

  <div id="form-wrapper" style="display:none;">

    <!-- Live preview -->
    <div id="preview-card" class="container">
      <div class="preview-meta">Preview — <span id="preview-date"></span></div>
      <h4 id="preview-title"></h4>
      <div class="preview-body" id="preview-body"></div>
      <div class="preview-link" id="preview-link" style="margin-top:12px;"></div>
    </div>

    <div class="form-card container">
      <h3 id="form-heading">🗞️ Add News Post</h3>

      <div class="form-group">
        <label>Headline <span style="color:#c0392b">*</span></label>
        <input type="text" id="f-title" class="form-control" placeholder="e.g. Pizza Scissors!! The cutting edge of pizza tech">
      </div>

      <div class="form-group">
        <label>Body</label>
        <textarea id="f-body" class="form-control" rows="6" placeholder="Write your post here…"></textarea>
      </div>

      <div class="section-label">External Link (optional)</div>

      <div class="row">
        <div class="col-sm-8">
          <div class="form-group">
            <label>URL</label>
            <input type="url" id="f-link-url" class="form-control" placeholder="https://example.com/article">
          </div>
        </div>
        <div class="col-sm-4">
          <div class="form-group">
            <label>Link Text</label>
            <input type="text" id="f-link-text" class="form-control" placeholder="Read more">
          </div>
        </div>
      </div>

      <div style="display:flex; gap:8px; margin-top:8px; align-items:center;">
        <button id="submit-btn" class="btn btn-danger" onclick="submitPost()">Publish Post</button>
        <a href="news.html" class="btn btn-default">Cancel</a>
      </div>
      <div id="form-status"></div>
    </div>
  </div>

  <footer><p>SliceFinder &copy;2026</p></footer>

  <script>
    document.getElementById('nav-toggle').addEventListener('click', function() {
      var nav = document.getElementById('bs-navbar');
      nav.classList.toggle('open');
      this.setAttribute('aria-expanded', nav.classList.contains('open'));
    });

    // Live preview
    function updatePreview() {
      const title   = document.getElementById('f-title')?.value.trim();
      const body    = document.getElementById('f-body')?.value.trim();
      const linkUrl = document.getElementById('f-link-url')?.value.trim();
      const linkTxt = document.getElementById('f-link-text')?.value.trim() || 'Read more';
      const card    = document.getElementById('preview-card');

      if (!title && !body) { card.style.display = 'none'; return; }
      card.style.display = 'block';
      document.getElementById('preview-title').textContent = title || '';
      document.getElementById('preview-body').textContent  = body  || '';
      document.getElementById('preview-date').textContent  = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
      const linkEl = document.getElementById('preview-link');
      linkEl.innerHTML = linkUrl ? `<a href="${linkUrl}" target="_blank">${linkTxt} →</a>` : '';
    }

    ['f-title','f-body','f-link-url','f-link-text'].forEach(id => {
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById(id)?.addEventListener('input', updatePreview);
      });
    });
  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js';
    import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyB-5Bz4rpHehUbxX7kP__-ap0xSuSdwZ0E",
      authDomain: "slicefinder-afd7f.firebaseapp.com",
      projectId: "slicefinder-afd7f",
      storageBucket: "slicefinder-afd7f.firebasestorage.app",
      messagingSenderId: "103165329059",
      appId: "1:103165329059:web:721f516c20d701ebe98916"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    let editId = new URLSearchParams(window.location.search).get('edit');
    let currentUser = null;

    // ── Admin check ───────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      const btn = document.getElementById('nav-auth-btn');
      if (btn) btn.textContent = user ? (user.displayName || 'My Profile') : 'Login';

      if (!user) { showAccessDenied(); return; }

      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().isAdmin === true) {
          showForm();
          if (editId) loadForEdit(editId);
          // Wire up preview listeners after form is visible
          ['f-title','f-body','f-link-url','f-link-text'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', updatePreview);
          });
        } else {
          showAccessDenied();
        }
      } catch(e) { showAccessDenied(); }
    });

    function showForm() {
      document.getElementById('auth-loading').style.display  = 'none';
      document.getElementById('access-denied').style.display = 'none';
      document.getElementById('form-wrapper').style.display  = 'block';
    }
    function showAccessDenied() {
      document.getElementById('auth-loading').style.display  = 'none';
      document.getElementById('form-wrapper').style.display  = 'none';
      document.getElementById('access-denied').style.display = 'block';
    }

    // ── Load post for editing ─────────────────────────────────────────
    async function loadForEdit(id) {
      try {
        const snap = await getDoc(doc(db, 'news', id));
        if (!snap.exists()) return;
        const p = snap.data();
        document.getElementById('f-title').value     = p.title    || '';
        document.getElementById('f-body').value      = p.body     || '';
        document.getElementById('f-link-url').value  = p.linkUrl  || '';
        document.getElementById('f-link-text').value = p.linkText || '';
        document.getElementById('form-heading').textContent = '✏️ Edit Post';
        document.getElementById('submit-btn').textContent   = 'Save Changes';
        updatePreview();
      } catch(e) { console.error('Could not load post for edit:', e); }
    }

    // ── Submit ────────────────────────────────────────────────────────
    window.submitPost = async function() {
      const statusEl = document.getElementById('form-status');
      const btn      = document.getElementById('submit-btn');
      const title    = document.getElementById('f-title').value.trim();

      if (!title) {
        statusEl.textContent = '❌ Headline is required.';
        statusEl.style.color = 'red';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Publishing…';
      statusEl.textContent = '';

      const data = {
        title,
        body:     document.getElementById('f-body').value.trim()      || null,
        linkUrl:  document.getElementById('f-link-url').value.trim()  || null,
        linkText: document.getElementById('f-link-text').value.trim() || null,
      };

      try {
        if (editId) {
          await updateDoc(doc(db, 'news', editId), data);
          statusEl.innerHTML = `✅ Post updated! <a href="news.html" style="color:#c0392b;font-weight:bold;">View on News page →</a>`;
        } else {
          await addDoc(collection(db, 'news'), {
            ...data,
            createdAt: serverTimestamp(),
            authorUid: currentUser.uid,
          });
          statusEl.innerHTML = `✅ Published! <a href="news.html" style="color:#c0392b;font-weight:bold;">View on News page →</a>`;
          // Clear form
          ['f-title','f-body','f-link-url','f-link-text'].forEach(id => {
            document.getElementById(id).value = '';
          });
          document.getElementById('preview-card').style.display = 'none';
        }
        statusEl.style.color = 'green';
      } catch(e) {
        statusEl.textContent = '❌ ' + e.message;
        statusEl.style.color = 'red';
      } finally {
        btn.disabled = false;
        btn.textContent = editId ? 'Save Changes' : 'Publish Post';
      }
    };

    function updatePreview() {
      const title   = document.getElementById('f-title')?.value.trim();
      const body    = document.getElementById('f-body')?.value.trim();
      const linkUrl = document.getElementById('f-link-url')?.value.trim();
      const linkTxt = document.getElementById('f-link-text')?.value.trim() || 'Read more';
      const card    = document.getElementById('preview-card');
      if (!title && !body) { card.style.display = 'none'; return; }
      card.style.display = 'block';
      document.getElementById('preview-title').textContent = title || '';
      document.getElementById('preview-body').textContent  = body  || '';
      document.getElementById('preview-date').textContent  = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
      const linkEl = document.getElementById('preview-link');
      linkEl.innerHTML = linkUrl ? `<a href="${linkUrl}" target="_blank">${linkTxt} →</a>` : '';
    }
  </script>

  <style>
    @media (max-width:767px) {
      #bs-navbar { display:none; width:100%; }
      #bs-navbar.open { display:block; }
      #bs-navbar .nav > li > a { color:#fff !important; padding:10px 16px; }
      #bs-navbar .nav > li > a:hover { background:#333 !important; }
      #nav-toggle { display:block !important; }
    }
    @media (min-width:768px) {
      #bs-navbar { display:block !important; }
      #nav-toggle { display:none !important; }
    }
  </style>

</body>
</html>
